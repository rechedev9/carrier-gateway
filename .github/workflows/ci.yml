name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: "1.25"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v2.1.6

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests with race detector and coverage
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Check coverage threshold
        run: |
          total=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${total}%"
          threshold=80
          int_total=$(echo "$total" | cut -d. -f1)
          if [ "$int_total" -lt "$threshold" ]; then
            echo "FAIL: coverage ${total}% is below ${threshold}% threshold"
            exit 1
          fi

  build:
    name: Build & Scan
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary
        run: go build -o carrier-gateway ./cmd/carrier-gateway

      - name: Build Docker image
        run: docker build -t carrier-gateway:ci .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: carrier-gateway:ci
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
