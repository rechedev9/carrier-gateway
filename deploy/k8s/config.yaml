apiVersion: v1
kind: ConfigMap
metadata:
  name: carrier-gateway-config
  namespace: carrier-gateway
  labels:
    app.kubernetes.io/name: carrier-gateway
data:
  ADDR: ":8080"
  CLEANUP_INTERVAL: "5m"
# Secret "carrier-gateway-secrets" is NOT defined here — create it externally
# via SealedSecrets, ExternalSecrets, or your CI pipeline.
# Required keys: API_KEYS, DATABASE_URL
# Optional keys: DELTA_BASE_URL, DELTA_API_KEY
