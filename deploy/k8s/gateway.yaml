apiVersion: apps/v1
kind: Deployment
metadata:
  name: carrier-gateway
  namespace: carrier-gateway
  labels:
    app.kubernetes.io/name: carrier-gateway
spec:
  # replicas managed by HPA (minReplicas: 2)
  selector:
    matchLabels:
      app.kubernetes.io/name: carrier-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: carrier-gateway
    spec:
      terminationGracePeriodSeconds: 35
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: carrier-gateway
      containers:
        - name: carrier-gateway
          image: carrier-gateway:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: carrier-gateway-config
            - secretRef:
                name: carrier-gateway-secrets
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            failureThreshold: 2
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: carrier-gateway
  namespace: carrier-gateway
  labels:
    app.kubernetes.io/name: carrier-gateway
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: carrier-gateway
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
