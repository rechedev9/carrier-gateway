# Metric names sourced from internal/metrics/prometheus.go.
# Thresholds from improvements.md §3.
groups:
  - name: carrier-gateway
    rules:
      # P99 latency > 2s signals upstream carrier degradation or network issues.
      # Bucket ceiling is 10s (see quoteLatencyBuckets in prometheus.go).
      - alert: HighLatencyP99
        expr: histogram_quantile(0.99, rate(carrier_quote_latency_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "P99 carrier quote latency exceeds 2s"
          description: "P99 latency is {{ $value | printf \"%.2f\" }}s over the last 5m."

      # 5% error rate across all non-success statuses (error, timeout, circuit_open, rate_limited).
      # Denominator guard (> 0) returns no-data instead of NaN during zero-traffic windows.
      - alert: HighErrorRate
        expr: sum(rate(carrier_requests_total{status!="success"}[5m])) / (sum(rate(carrier_requests_total[5m])) > 0) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Carrier error rate exceeds 5%"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5m."

      # CB state enum: 0=closed, 1=open, 2=halfopen (see ports.CBState).
      # Fires per carrier_id label — each open breaker is a separate alert instance.
      - alert: CircuitBreakerOpen
        expr: carrier_circuit_breaker_state == 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Circuit breaker open for {{ $labels.carrier_id }}"
          description: "Carrier {{ $labels.carrier_id }} circuit breaker has been open for more than 5m."

      # Global hedge-to-request ratio. hedge_requests_total and carrier_requests_total
      # have different label sets (carrier_id+trigger_carrier vs carrier_id+status),
      # so sum() aggregates both to scalars before dividing.
      - alert: ExcessiveHedging
        expr: sum(rate(hedge_requests_total[5m])) / (sum(rate(carrier_requests_total[5m])) > 0) > 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Hedge ratio exceeds 20%"
          description: "Hedge-to-request ratio is {{ $value | humanizePercentage }} over the last 5m."

      # 0.167/s = 10 rejections/min. Aggregated across all carriers.
      # 2m rate window gives ~8 samples at 15s scrape interval for stability.
      - alert: RateLimitingActive
        expr: sum(rate(rate_limit_exceeded_total[2m])) > 0.167
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Rate limiting active (>10 rejections/min)"
          description: "Rate limit rejections: {{ $value | printf \"%.3f\" }}/s over the last 2m."
